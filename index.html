<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRスキャナー PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { text-align: center; font-family: sans-serif; background: #333; color: white; margin: 0; transition: background 0.2s; }
    #video { width: 100%; max-width: 500px; border: 2px solid #555; }
    #msg { padding: 20px; font-size: 1.2em; font-weight: bold; }
    .success-flash { background: white !important; color: black !important; }
    .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
  </style>
</head>
<body>
  <h2 style="margin:10px 0;">QR受付システム</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="msg">カメラ起動中...</div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby8PNKci_n-s8DIGGo30IuKm-aHnTTBGo7oIX_FuHzTWO6GS_saL8AeC__laJAD9QlVfw/exec"; // ★ここを自分のURLに書き換えて！
    
    const video = document.getElementById("video");
    const msg = document.getElementById("msg");
    const body = document.body;
    let isProcessing = false; // 送信中フラグ

    // 効果音の作成（ブラウザ標準のビープ音）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";
      osc.frequency.value = 880; // 高めの音
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
      osc.stop(audioCtx.currentTime + 0.1);
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        video.srcObject = stream;
        msg.innerText = "QRをかざしてください";
        requestAnimationFrame(tick);
      });

    function tick() {
      if (!isProcessing && video.readyState === video.HAVE_ENOUGH_DATA) {
        const canvas = document.createElement("canvas");
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);

        if (code) {
          onQrDetected(code.data);
          return; 
        }
      }
      requestAnimationFrame(tick);
    }

    function onQrDetected(qrData) {
      isProcessing = true;
      playBeep(); // 音を鳴らす
      body.classList.add("success-flash"); // 画面を一瞬白くする
      msg.innerHTML = `<span class="loading-dots">送信中: ${qrData}</span>`;

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", // 爆速化のため応答を待たない設定
        body: JSON.stringify({ data: qrData })
      })
      .then(() => {
        body.classList.remove("success-flash");
        msg.innerText = "✅ 記録完了！ 次の人どうぞ";
        setTimeout(() => {
          isProcessing = false;
          msg.innerText = "QRをかざしてください";
          requestAnimationFrame(tick);
        }, 1500); // 1.5秒待機してから次へ
      })
      .catch(err => {
        alert("送信失敗: " + err);
        isProcessing = false;
        requestAnimationFrame(tick);
      });
    }
  </script>
</body>
</html>
